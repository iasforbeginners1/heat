<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Blood Flow Game</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; }
        #game-container { position: relative; width: 800px; height: 600px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; margin-top: 20px; }
        
        /* Labeling Section */
        #labels-store { width: 800px; background: #34495e; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .label { padding: 8px 15px; background: #ecf0f1; border: 2px solid #bdc3c7; cursor: grab; border-radius: 5px; font-weight: bold; }
        
        /* Heart Diagram Area */
        #heart-canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        .drop-zone { position: absolute; border: 2px dashed #95a5a6; width: 120px; height: 35px; z-index: 2; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #7f8c8d; border-radius: 5px; }

        /* Flow Control Buttons */
        .controls { margin-top: 20px; }
        button { padding: 10px 25px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; transition: 0.3s; }
        .btn-red { background: #e74c3c; color: white; }
        .btn-blue { background: #3498db; color: white; }
        #msg { margin-top: 10px; font-weight: bold; height: 20px; }
    </style>
</head>
<body>

    <h2>Heart Anatomy & Blood Flow Interactive</h2>
    
    <div id="labels-store">
        <div class="label" draggable="true" id="label-aorta">Aorta</div>
        <div class="label" draggable="true" id="label-vc">Vena Cava</div>
        <div class="label" draggable="true" id="label-pa">Pulmonary Artery</div>
        <div class="label" draggable="true" id="label-pv">Pulmonary Vein</div>
        <div class="label" draggable="true" id="label-val">Mitral Valve</div>
    </div>

    <div id="game-container">
        <canvas id="heart-canvas" width="800" height="600"></canvas>
        
        <!-- Drop Zones for Names -->
        <div class="drop-zone" style="top: 50px; left: 340px;" data-target="label-aorta">Drop Aorta Here</div>
        <div class="drop-zone" style="top: 150px; left: 100px;" data-target="label-vc">Drop Vena Cava Here</div>
        <div class="drop-zone" style="top: 80px; left: 550px;" data-target="label-pa">Drop Pulm. Artery</div>
        
        <!-- Buttons for Flow -->
        <div style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 10;">
            <button class="btn-blue" onclick="checkFlow('blue')">Set Blue Flow (CO2)</button>
            <button class="btn-red" onclick="checkFlow('red')">Set Red Flow (O2)</button>
        </div>
    </div>

    <div id="msg"></div>

<script>
    const canvas = document.getElementById('heart-canvas');
    const ctx = canvas.getContext('2d');
    let activeFlow = null;

    // Draw a Simple Heart Representation
    function drawHeart() {
        ctx.clearRect(0,0,800,600);
        ctx.lineWidth = 5;
        ctx.strokeStyle = '#2c3e50';

        // Right side (Blue side - left in diagram)
        ctx.beginPath();
        ctx.arc(300, 300, 80, 0.5 * Math.PI, 1.5 * Math.PI);
        ctx.stroke();

        // Left side (Red side - right in diagram)
        ctx.beginPath();
        ctx.arc(500, 300, 80, 1.5 * Math.PI, 0.5 * Math.PI);
        ctx.stroke();

        // Connecting lines for valves
        ctx.moveTo(380, 250); ctx.lineTo(420, 250);
        ctx.moveTo(380, 350); ctx.lineTo(420, 350);
        ctx.stroke();
        
        ctx.font = "16px Arial";
        ctx.fillText("Right Atrium", 240, 280);
        ctx.fillText("Left Atrium", 470, 280);
    }

    // Animation for Blood Flow
    let particles = [];
    function createParticle(type) {
        return {
            x: type === 'blue' ? 150 : 650,
            y: 100,
            targetX: type === 'blue' ? 300 : 500,
            targetY: 500,
            color: type === 'blue' ? '#3498db' : '#e74c3c'
        };
    }

    function animate() {
        if(activeFlow) {
            drawHeart();
            if(Math.random() > 0.8) particles.push(createParticle(activeFlow));
            
            particles.forEach((p, index) => {
                p.y += 3;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
                ctx.fill();
                if(p.y > 600) particles.splice(index, 1);
            });
        }
        requestAnimationFrame(animate);
    }

    function checkFlow(type) {
        activeFlow = type;
        document.getElementById('msg').innerText = type === 'blue' ? "Correct! Blue blood entering through Vena Cava." : "Correct! Red blood flowing to Aorta.";
        document.getElementById('msg').style.color = type === 'blue' ? '#3498db' : '#e74c3c';
    }

    // Drag and Drop Logic
    const labels = document.querySelectorAll('.label');
    const zones = document.querySelectorAll('.drop-zone');

    labels.forEach(label => {
        label.addEventListener('dragstart', (e) => {
            e.dataTransfer.setData('text', e.target.id);
        });
    });

    zones.forEach(zone => {
        zone.addEventListener('dragover', (e) => e.preventDefault());
        zone.addEventListener('drop', (e) => {
            e.preventDefault();
            const data = e.dataTransfer.getData('text');
            if(zone.getAttribute('data-target') === data) {
                zone.style.background = "#2ecc71";
                zone.style.color = "white";
                zone.innerText = document.getElementById(data).innerText;
                document.getElementById(data).style.visibility = "hidden";
                document.getElementById('msg').innerText = "Sahi Pehchana!";
            } else {
                document.getElementById('msg').innerText = "Galat Jagah Hai!";
                document.getElementById('msg').style.color = "red";
            }
        });
    });

    drawHeart();
    animate();
</script>
</body>
</html>
