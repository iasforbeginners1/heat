<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioHeart Interactive</title>
    <style>
        :root { --red: #ff4d4d; --blue: #4d94ff; --dark: #121212; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; touch-action: manipulation; }
        
        #ui-panel { width: 90%; max-width: 500px; padding: 20px; text-align: center; }
        .label-bank { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 15px 0; }
        .chip { padding: 10px 15px; background: #333; border: 1px solid #555; border-radius: 20px; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .chip:active { transform: scale(0.9); }
        .chip.selected { border-color: yellow; background: #444; box-shadow: 0 0 10px yellow; }

        #game-box { position: relative; width: 380px; height: 450px; background: #1e1e1e; border-radius: 20px; border: 2px solid #333; }
        svg { width: 100%; height: 100%; }
        
        .target-node { fill: rgba(255,255,255,0.1); stroke: white; stroke-dasharray: 4; cursor: pointer; }
        .target-node:hover { fill: rgba(255,255,255,0.2); }
        .correct { stroke: #2ecc71 !important; stroke-dasharray: 0 !important; fill: rgba(46, 204, 113, 0.2) !important; }
        
        #msg { height: 30px; font-weight: bold; margin-top: 10px; color: #aaa; }
        .flow-line { fill: none; stroke-width: 4; stroke-linecap: round; opacity: 0; transition: 1s; }
    </style>
</head>
<body>

<div id="ui-panel">
    <h2>Anatomy of Heart</h2>
    <p style="font-size: 0.9em; opacity: 0.7;">Naam select karein aur diagram mein 'Circles' par click karein</p>
    <div class="label-bank" id="bank">
        <div class="chip" onclick="selectLabel(this, 'AORTA')">AORTA (O2)</div>
        <div class="chip" onclick="selectLabel(this, 'V.CAVA')">V.CAVA (CO2)</div>
        <div class="chip" onclick="selectLabel(this, 'P.ARTERY')">P.ARTERY (CO2)</div>
        <div class="chip" onclick="selectLabel(this, 'P.VEIN')">P.VEIN (O2)</div>
        <div class="chip" onclick="selectLabel(this, 'VALVE')">MITRAL VALVE</div>
    </div>
    <div id="msg">Shuru karein!</div>
</div>

<div id="game-box">
    <svg viewBox="0 0 400 500">
        <!-- Simplified Heart Structure -->
        <!-- Right Side (Blue) -->
        <path d="M150 150 Q100 150 100 250 T180 400 L200 400 L200 120 Z" fill="#2c3e50" stroke="#4d94ff" stroke-width="3"/>
        <!-- Left Side (Red) -->
        <path d="M250 150 Q300 150 300 250 T220 400 L200 400 L200 120 Z" fill="#3d2b2b" stroke="#ff4d4d" stroke-width="3"/>
        
        <!-- Blood Flow Paths (Hidden initially) -->
        <path id="path-blue" class="flow-line" d="M80 100 Q120 150 150 250" stroke="#4d94ff" />
        <path id="path-red" class="flow-line" d="M320 100 Q280 150 250 250" stroke="#ff4d4d" />

        <!-- Target Zones -->
        <circle class="target-node" cx="80" cy="100" r="20" onclick="checkMatch(this, 'V.CAVA')" />
        <circle class="target-node" cx="320" cy="100" r="20" onclick="checkMatch(this, 'AORTA')" />
        <circle class="target-node" cx="200" cy="80" r="20" onclick="checkMatch(this, 'P.ARTERY')" />
        <circle class="target-node" cx="350" cy="250" r="20" onclick="checkMatch(this, 'P.VEIN')" />
        <circle class="target-node" cx="240" cy="260" r="15" onclick="checkMatch(this, 'VALVE')" />

        <!-- Labels that appear after correct match -->
        <text id="txt-V.CAVA" x="30" y="70" fill="white" font-size="12" visibility="hidden">Vena Cava</text>
        <text id="txt-AORTA" x="330" y="70" fill="white" font-size="12" visibility="hidden">Aorta</text>
    </svg>
</div>

<script>
    let activeLabel = null;
    let score = 0;

    function selectLabel(el, val) {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        activeLabel = val;
        document.getElementById('msg').innerText = "Ab diagram mein " + val + " ki jagah chunein";
        document.getElementById('msg').style.color = "yellow";
    }

    function checkMatch(node, targetName) {
        if (!activeLabel) {
            document.getElementById('msg').innerText = "Pehle upar se ek naam chunein!";
            return;
        }

        if (activeLabel === targetName) {
            node.classList.add('correct');
            document.getElementById('txt-' + targetName)?.setAttribute('visibility', 'visible');
            document.getElementById('msg').innerText = "Shabash! Sahi hai.";
            document.getElementById('msg').style.color = "#2ecc71";
            
            // Trigger animation based on type
            if(targetName === 'V.CAVA') document.getElementById('path-blue').style.opacity = "1";
            if(targetName === 'AORTA') document.getElementById('path-red').style.opacity = "1";
            
            activeLabel = null;
            document.querySelectorAll('.chip.selected').forEach(c => c.style.display = "none");
        } else {
            document.getElementById('msg').innerText = "Galat! Ye " + targetName + " nahi hai.";
            document.getElementById('msg').style.color = "#ff4d4d";
        }
    }
</script>

</body>
</html>
