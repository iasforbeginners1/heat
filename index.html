<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Flow Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; overflow-x: hidden; font-family: sans-serif; }
        #ui-layer { width: 100%; max-width: 600px; padding: 15px; text-align: center; }
        .label-box { display: inline-block; padding: 8px 12px; margin: 5px; background: #444; border: 2px solid #666; border-radius: 5px; cursor: pointer; user-select: none; transition: 0.2s; }
        .label-box:active { transform: scale(0.9); background: #666; }
        #canvas-container { border: 2px solid #333; border-radius: 20px; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5); position: relative; }
        .instruction { font-size: 14px; color: #aaa; margin-bottom: 10px; }
        .status-msg { height: 25px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h3>Heart Anatomy Quiz</h3>
        <p class="instruction">Naam ko click karein aur heart ke sahi part par click karein</p>
        <div id="labels-container">
            <div class="label-box" onclick="selectLabel('AORTA', 'red')">AORTA</div>
            <div class="label-box" onclick="selectLabel('VENA CAVA', 'blue')">VENA CAVA</div>
            <div class="label-box" onclick="selectLabel('PULM. ARTERY', 'blue')">PULM. ARTERY</div>
            <div class="label-box" onclick="selectLabel('PULM. VEIN', 'red')">PULM. VEIN</div>
        </div>
        <div id="status" class="status-msg">Apna Label Chunein...</div>
    </div>

    <div id="canvas-container"></div>

<script>
let particles = [];
let selectedLabel = null;
let selectedColor = '';
let targets = [
    { name: 'VENA CAVA', x: 100, y: 150, hit: false, flow: 'blue' },
    { name: 'PULM. ARTERY', x: 150, y: 50, hit: false, flow: 'blue' },
    { name: 'PULM. VEIN', x: 250, y: 50, hit: false, flow: 'red' },
    { name: 'AORTA', x: 300, y: 100, hit: false, flow: 'red' }
];

function setup() {
    let cnv = createCanvas(400, 500);
    cnv.parent('canvas-container');
}

function draw() {
    background(30);
    
    // Heart Shape Drawing (Stylized)
    noFill();
    strokeWeight(4);
    
    // Left Heart (Blue Side)
    stroke(0, 100, 255);
    arc(150, 250, 120, 200, HALF_PI, PI + HALF_PI);
    
    // Right Heart (Red Side)
    stroke(255, 50, 50);
    arc(250, 250, 120, 200, PI + HALF_PI, HALF_PI);

    // Draw Targets
    targets.forEach(t => {
        if (t.hit) {
            fill(t.flow === 'red' ? [255, 50, 50] : [0, 100, 255]);
            noStroke();
            ellipse(t.x, t.y, 20, 20);
            textSize(12);
            textAlign(CENTER);
            text(t.name, t.x, t.y - 15);
            
            // Generate Flow Particles if hit
            if (frameCount % 5 == 0) {
                particles.push(new Particle(t.x, t.y, t.flow));
            }
        } else {
            fill(50);
            stroke(100);
            ellipse(t.x, t.y, 15, 15);
        }
    });

    // Update and Show Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].show();
        if (particles[i].finished()) {
            particles.splice(i, 1);
        }
    }
}

function selectLabel(name, color) {
    selectedLabel = name;
    selectedColor = color;
    document.getElementById('status').innerText = "Ab '" + name + "' ki sahi jagah par click karein";
    document.getElementById('status').style.color = (color === 'red' ? '#ff4d4d' : '#4d94ff');
}

function mousePressed() {
    if (selectedLabel) {
        targets.forEach(t => {
            let d = dist(mouseX, mouseY, t.x, t.y);
            if (d < 30) {
                if (t.name === selectedLabel) {
                    t.hit = true;
                    document.getElementById('status').innerText = "Sahi Jawab! Flow shuru ho gaya.";
                    selectedLabel = null;
                } else {
                    document.getElementById('status').innerText = "Galat! Firse koshish karein.";
                }
            }
        });
    }
}

class Particle {
    constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.vx = random(-1, 1);
        this.vy = random(2, 5);
        this.alpha = 255;
        this.color = (type === 'red') ? [255, 50, 50] : [50, 100, 255];
    }
    finished() { return this.alpha < 0; }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= 3;
    }
    show() {
        noStroke();
        fill(this.color[0], this.color[1], this.color[2], this.alpha);
        ellipse(this.x, this.y, 8);
    }
}
</script>
</body>
</html>
